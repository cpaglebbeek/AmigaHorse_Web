<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full mode — AmigaHorse</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="full-mode" style="max-width:1200px; padding:2rem;">
    <header>
      <h1>AmigaHorse — Full mode</h1>
      <p>Library, settings, save-states. v0.0.2 skelet — compat-set komt v0.0.3.</p>
    </header>

    <section id="library">
      <h2>Library</h2>
      <p>
        Kickstart ROM (eenmalig):
        <input type="file" id="upload-kick-full" accept=".rom,.bin">
      </p>
      <div id="dropzone-full" class="dropzone" tabindex="0">
        <span class="hero-text">Drop ADF/HDF om toe te voegen</span>
        <small>Klik Play in de lijst hieronder om te starten</small>
      </div>
      <p id="status" style="text-align:center; margin-top:0.75rem; min-height:1.5rem;"></p>
      <ul id="library-list" style="margin-top:1.5rem; font-family:var(--font-mono); list-style:none; padding:0;"></ul>
    </section>

    <canvas id="emulator" class="emulator-canvas" width="320" height="256" style="display:none; margin-top:2rem; max-width:100%;"></canvas>

    <nav style="margin-top:2rem;">
      <a href="/">← Mode-picker</a>
      <span> · </span>
      <a href="/basic/">Quick BASIC →</a>
    </nav>
  </main>

  <script type="module" src="./library.js"></script>
</body>
</html>
